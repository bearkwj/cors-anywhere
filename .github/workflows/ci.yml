name: Node.js CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - "**"

jobs:
  # job 이름을 'docker'에서 'build-and-test'로 변경했습니다.
  build-and-test:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      # 최신 v4 버전 사용 권장 (성능 및 보안 개선)
      - name: Checkout
        uses: actions/checkout@v4

      # Node.js 설정 (v4 버전 사용 및 버전 명시)
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'yarn'

      # 의존성 설치 (frozen-lockfile을 사용하면 더 안전합니다)
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # 테스트 수행
      - name: Run tests
        run: yarn test:report

      # 테스트 결과를 레포트로 변환
      - name: Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: test-results
          path: junit.xml
          fail-on-error: 'false'
          reporter: jest-junit
          token: ${{ secrets.GITHUB_TOKEN }}

      # 빌드 성공 메세지 발송
      - name: Send Build Success Message
        uses: appleboy/telegram-action@master
        if: success()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            👤 **Author**: ${{ github.actor }}
            ✅ **Status**: Success
            📝 **Commit**: ${{ github.event.head_commit.message || 'Pull Request' }}
            
            [See changes](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      # 빌드 실패 메세지 발송
      - name: Send Build Failure Message
        uses: appleboy/telegram-action@master
        if: failure()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            👤 **Author**: ${{ github.actor }}
            ❌ **Status**: Failure
            📝 **Commit**: ${{ github.event.head_commit.message || 'Pull Request' }}
            
            [Check Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
